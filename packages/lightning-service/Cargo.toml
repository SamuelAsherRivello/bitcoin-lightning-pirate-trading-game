[package]
name = "lightning-service"
version = "0.1.0"
edition = "2021"

[features]
default = []
lnd-grpc = ["dep:tonic_lnd"]

[dependencies]
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tonic_lnd = { version = "0.5.1", optional = true }
